name: Release

# Fires on a version tag. Packages the canonical UMM zip (05 §3), publishes a GitHub Release at the
# exact DownloadUrl repository.json points to, updates repository.json, and pushes to Nexus.
# Validated end-to-end by the v0.0.2 dry-run once secrets are wired (05 §7 item 4).
#
# Requires: STEAM_* secrets + UMM_ZIP_URL (to build the mod), NEXUS_API_KEY secret.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

env:
  DV_APP: "588030"
  DV_DEPOT: "588031"

jobs:
  release:
    name: Package + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verify tag matches the single version source, and CHANGELOG has a section
        id: ver
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          props="$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)"
          if [ "$tag" != "$props" ]; then
            echo "::error::tag v$tag != Directory.Build.props <Version>$props< (05 §2)"; exit 1
          fi
          if ! grep -qE "^## \[$tag\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$tag]' section (release gate, 05 §2)"; exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      # --- Acquire game + UMM assemblies (same mechanism as build.yml) ---
      - name: Read pinned depot manifest
        id: pin
        run: echo "manifest=$(jq -r '.manifest' .ci/depot.json)" >> "$GITHUB_OUTPUT"
      - name: Install DepotDownloader
        run: dotnet tool install --global DepotDownloader
      - name: Generate Steam TOTP
        id: totp
        uses: CyberAndrii/steam-totp@v1
        with:
          shared_secret: ${{ secrets.STEAM_SHARED_SECRET }}
      - name: Download game assemblies
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_TOTP: ${{ steps.totp.outputs.code }}
          MANIFEST: ${{ steps.pin.outputs.manifest }}
        run: |
          set -euo pipefail
          args=(-app "$DV_APP" -depot "$DV_DEPOT" -dir game -filelist .ci/depot-filelist.txt \
                -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD")
          [ "$MANIFEST" != "REPLACE_WITH_PINNED_MANIFEST" ] && args+=(-manifest "$MANIFEST")
          echo "$STEAM_TOTP" | DepotDownloader "${args[@]}"
      - name: Fetch UnityModManager + Harmony
        env:
          UMM_ZIP_URL: ${{ vars.UMM_ZIP_URL }}
        run: |
          set -euo pipefail
          curl -fsSL "$UMM_ZIP_URL" -o umm.zip && unzip -oq umm.zip -d umm
          dest="game/DerailValley_Data/Managed/UnityModManager"; mkdir -p "$dest"
          cp "$(find umm -name UnityModManager.dll | head -1)" "$dest/"
          cp "$(find umm -name 0Harmony.dll | head -1)" "$dest/"
      - name: Point the build at the downloaded assemblies
        run: |
          cat > Directory.Build.targets <<'EOF'
          <Project>
            <PropertyGroup>
              <DvManaged>$(MSBuildThisFileDirectory)game/DerailValley_Data/Managed</DvManaged>
              <DvUmm>$(DvManaged)/UnityModManager</DvUmm>
            </PropertyGroup>
            <ItemGroup Condition="'$(LocoMpGameProject)' == 'true'">
              <Reference Include="UnityModManager"><HintPath>$(DvUmm)/UnityModManager.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="0Harmony"><HintPath>$(DvUmm)/0Harmony.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="Assembly-CSharp"><HintPath>$(DvManaged)/Assembly-CSharp.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="UnityEngine"><HintPath>$(DvManaged)/UnityEngine.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="UnityEngine.CoreModule"><HintPath>$(DvManaged)/UnityEngine.CoreModule.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.Simulation"><HintPath>$(DvManaged)/DV.Simulation.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.Common"><HintPath>$(DvManaged)/DV.Common.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.RailTrack"><HintPath>$(DvManaged)/DV.RailTrack.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.Utils"><HintPath>$(DvManaged)/DV.Utils.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="BezierCurves"><HintPath>$(DvManaged)/BezierCurves.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.PointSet"><HintPath>$(DvManaged)/DV.PointSet.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="net.smkd.vector3d"><HintPath>$(DvManaged)/net.smkd.vector3d.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.Inventory"><HintPath>$(DvManaged)/DV.Inventory.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.ThingTypes"><HintPath>$(DvManaged)/DV.ThingTypes.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="DV.OriginShiftInfo"><HintPath>$(DvManaged)/DV.OriginShiftInfo.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="UnityEngine.PhysicsModule"><HintPath>$(DvManaged)/UnityEngine.PhysicsModule.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="UnityEngine.TextRenderingModule"><HintPath>$(DvManaged)/UnityEngine.TextRenderingModule.dll</HintPath><Private>false</Private></Reference>
              <Reference Include="UnityEngine.IMGUIModule"><HintPath>$(DvManaged)/UnityEngine.IMGUIModule.dll</HintPath><Private>false</Private></Reference>
            </ItemGroup>
          </Project>
          EOF

      - name: Build Release
        run: dotnet build LocoMP.sln -c Release

      - name: Package canonical UMM zip
        id: pkg
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          stage="dist/LocoMP"
          mkdir -p "$stage"
          # Only LocoMP*.dll + third-party runtime deps land in output; game/UMM/Harmony are Private=false.
          cp src/LocoMP/bin/Release/net48/*.dll "$stage/"
          cp src/LocoMP/Info.json "$stage/"
          cp LICENSE "$stage/"
          cat > "$stage/SOURCE.txt" <<EOF
          LocoMP — Multiplayer for Derail Valley
          Source: https://github.com/DSMedia-gg/LocoMP
          License: MIT (see LICENSE)
          Independent, fan-made project — not affiliated with or endorsed by Altfuture.
          EOF
          (cd dist && zip -r "LocoMP_v${V}.zip" LocoMP)
          echo "zip=dist/LocoMP_v${V}.zip" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "v${V}" "${{ steps.pkg.outputs.zip }}" \
            --title "LocoMP v${V}" \
            --notes "See CHANGELOG.md for the v${V} section."

      - name: Update repository.json to the released version
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          url="https://github.com/DSMedia-gg/LocoMP/releases/download/v${V}/LocoMP_v${V}.zip"
          jq --arg v "$V" --arg u "$url" \
             '.Releases[0].Version=$v | .Releases[0].DownloadUrl=$u' repository.json > tmp && mv tmp repository.json
          git config user.name "locomp-release[bot]"
          git config user.email "release-bot@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add repository.json
          git commit -s -m "ci: update repository.json for v${V}" || echo "no change"
          # NOTE: branch protection must allow this bot push (or swap to a PAT). See handoff.
          git push origin main

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1
        with:
          # Confirm exact input names against the pinned action's README (05 §4).
          api_key: ${{ secrets.NEXUS_API_KEY }}
          game_domain: derailvalley
          mod_id: 1598
          file_id: 7674930
          version: ${{ steps.ver.outputs.version }}
          name: LocoMP v${{ steps.ver.outputs.version }}
          file_path: ${{ steps.pkg.outputs.zip }}

      - name: Rebuild site changelog
        run: |
          echo "TODO: trigger locomp.dsm.gg changelog rebuild once the site exists (06)."
