name: PR

# The game-free gate that runs on every PR. Never needs Steam or a game install — that is the whole
# reason LocoMP.Core/Transport/Api carry no Unity/DV references (03 §2, hard rule 8).
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (game-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore LocoMP.NoGame.slnf

      - name: Build
        run: dotnet build LocoMP.NoGame.slnf -c Release --no-restore

      - name: Test
        run: dotnet test LocoMP.NoGame.slnf -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every PR commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          for c in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            if ! git show -s --format=%B "$c" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit ${c:0:12} is missing a Signed-off-by line — run 'git commit -s'."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "DCO required. See CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits signed off. ✔"
